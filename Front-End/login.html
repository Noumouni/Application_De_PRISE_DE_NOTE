<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notely</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
      integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    </head>

<body>

  <div class="flex-items">
  <div class="logo-mark">
    <i class="fa-solid fa-note-sticky"></i>
  </div>
  <span>Notely</span>
  <p>Vos notes, partagées en temps réel</p>
</div>

<main class="sign_up_page">

  <div class="login-card">

    <div class="tab-switch">
      <button class="btn_connexion">Connexion</button>
      <button class="btn_sign_up">Inscription</button>
    </div>

   <div class="form-login">

   <div class="form-group">
    <form action="" ></form>
      <label for="email">ADRESSE E-MAIL</label>
      <input type="email" 
       name="email" 
       id="email"
       placeholder="Vous@example.com">
      </div>

      <div class="form-group">
     <label for="password">MOT DE PASSE</label>
     <input type="password"
      name="password" 
      id="password" 
      placeholder="••••••••">
     </div>

    <button type="submit" class="btn-login">Se connecter <i class="fa-solid fa-arrow-right"></i></button>
    <div class="divider">ou continuer avec </div>

   <button type="button" class="btn-oauth">
    <img src="Asset/Google_logo.svg.png" width="18">
    <span>Continuer avec Google</span>
    </button>

<!-- Formulaire 2 : Inscription (caché au départ) -->
  <div class="sign_up" style="display: none;">

    <h1 class="sign_up_title">Inscrivez-Vous</h1>
    <form action="" class="sign_up__form">
      <div class="sign_up_input_group">
       <label for="username" class="sign_up_label">Nom d'utilisateur</label>
      <div class="sign-up-icon-input-container">
        <input type="text"
        id="username"
        name="username"
         placeholder="Alice Dupont"
         maxlength="24"
         class="sign_up_input">
         <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M320 576C178.6 576 64 461.4 64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576zM438 209.7C427.3 201.9 412.3 204.3 404.5 215L285.1 379.2L233 327.1C223.6 317.7 208.4 317.7 199.1 327.1C189.8 336.5 189.7 351.7 199.1 361L271.1 433C276.1 438 282.9 440.5 289.9 440C296.9 439.5 303.3 435.9 307.4 430.2L443.3 243.2C451.1 232.5 448.7 217.5 438 209.7z"/></svg>
      </div>
       <p class="sign_up_error_message">Choisissez un pseudo contenant au moins 3 caractères</p>
      </div>




      <div class="sign_up_input_group">
        <label for="email" class="sign_up_label">Entrez votre email </label>
       <div class="sign-up-icon-input-container">
         <input type="email"
         id="email"
         name="email"
          placeholder="vous@example.com"
          maxlength="24"
          class="sign_up_input">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M320 576C178.6 576 64 461.4 64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576zM438 209.7C427.3 201.9 412.3 204.3 404.5 215L285.1 379.2L233 327.1C223.6 317.7 208.4 317.7 199.1 327.1C189.8 336.5 189.7 351.7 199.1 361L271.1 433C276.1 438 282.9 440.5 289.9 440C296.9 439.5 303.3 435.9 307.4 430.2L443.3 243.2C451.1 232.5 448.7 217.5 438 209.7z"/></svg>
       </div>
        <p class="sign_up_error_message">Rentrez un email valide /p>
       </div>



       <div class="sign_up_input_group">
        <label for="password" class="sign_up_label">Mot de passe </label>
       <div class="sign-up-icon-input-container">
         <input 
         type="password"
         id="password"
         name="password"
          placeholder="Votre mot de passe"
          maxlength="24"
          class="sign_up_input">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M320 576C178.6 576 64 461.4 64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576zM438 209.7C427.3 201.9 412.3 204.3 404.5 215L285.1 379.2L233 327.1C223.6 317.7 208.4 317.7 199.1 327.1C189.8 336.5 189.7 351.7 199.1 361L271.1 433C276.1 438 282.9 440.5 289.9 440C296.9 439.5 303.3 435.9 307.4 430.2L443.3 243.2C451.1 232.5 448.7 217.5 438 209.7z"/></svg>
       </div>
        <p class="sign_up_error_message">Respectez les condition du mot de passe</p>
       </div>
  
       <div class="sign_up_input_group">
        <label for="repeat-password" class="sign_up_label">Confirmez le mot de passe  </label>
       <div class="sign-up-icon-input-container">
         <input 
         type="password"
         id="repeat-password"
         name="repeat-password"
          placeholder="Confirmez le mot de passe"
          maxlength="24"
          class="sign_up_input">
       </div>
        <p class="sign_up_error_message">Les mots de passe ne sont identique </p>
       </div>
       <button type="submit" class="sign_up_submit_button">Création du compte →</button>
    </form>
    </div>
  
  </div> 
  </div>
</main>


</body>
</html>
